<!doctype html>
<html lang="en-GB">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>EUW Rank Distribution — Bar Chart</title>
        <style>
            :root {
                /* LoL-inspired dark + gold */
                --bg: #05070f;
                --bg2: #0a1430;
                --panel: rgba(8, 18, 38, 0.78);
                --panel2: rgba(12, 26, 52, 0.78);
                --text: #eaf0ff;
                --muted: rgba(234, 240, 255, 0.68);
                --grid: rgba(255, 255, 255, 0.08);
                --gold: #c8aa6e;
                --gold2: #f0e6d2;
                --stroke: rgba(200, 170, 110, 0.22);
                --stroke2: rgba(255, 255, 255, 0.08);
                --shadow: rgba(0, 0, 0, 0.55);

                /* Tier colours (matched to your screenshot palette) */
                --tier-challenger: #6a2ccf;
                --tier-grandmaster: #7a2ed1;
                --tier-master: #8c35d6;
                --tier-diamond: #2d6aa8;
                --tier-emerald: #2f7d3d;
                --tier-platinum: #1f7481;
                --tier-gold: #8a5a12;
                --tier-silver: #6d7787;
                --tier-bronze: #7a4a29;
                --tier-iron: #4b4654;

                --hover: rgba(240, 230, 210, 0.95);
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                font-family:
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    Segoe UI,
                    Roboto,
                    Arial,
                    sans-serif;
                background: radial-gradient(1200px 700px at 25% -10%, rgba(200, 170, 110, 0.18), transparent 58%),
                    radial-gradient(900px 600px at 110% 15%, rgba(60, 140, 255, 0.16), transparent 55%),
                    radial-gradient(800px 520px at 60% 120%, rgba(120, 80, 255, 0.1), transparent 55%),
                    linear-gradient(180deg, var(--bg2), var(--bg));
                color: var(--text);
            }
            .wrap {
                max-width: 1100px;
                margin: 0 auto;
                padding: 20px 16px 28px;
            }
            header {
                display: flex;
                flex-wrap: wrap;
                gap: 12px 16px;
                align-items: baseline;
                justify-content: space-between;
                margin-bottom: 14px;
            }
            h1 {
                font-size: 18px;
                margin: 0;
                letter-spacing: 0.2px;
            }
            .sub {
                color: var(--muted);
                font-size: 13px;
            }
            .panel {
                background: linear-gradient(180deg, var(--panel), var(--panel2));
                border: 1px solid var(--stroke);
                border-radius: 14px;
                padding: 14px;
                box-shadow: 0 18px 40px var(--shadow);
                backdrop-filter: blur(8px);
            }
            .controls {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 10px;
            }
            .left,
            .right {
                display: flex;
                gap: 10px;
                align-items: center;
                flex-wrap: wrap;
            }
            .btn {
                appearance: none;
                border: 1px solid var(--stroke2);
                background: rgba(255, 255, 255, 0.06);
                color: var(--text);
                padding: 9px 12px;
                border-radius: 12px;
                cursor: pointer;
                font-weight: 700;
                font-size: 13px;
                letter-spacing: 0.2px;
                transition:
                    transform 80ms ease,
                    background 120ms ease,
                    border-color 120ms ease;
            }
            .btn:hover {
                transform: translateY(-1px);
                border-color: rgba(200, 170, 110, 0.38);
            }
            .btn[aria-pressed="true"] {
                border-color: rgba(200, 170, 110, 0.55);
                background: rgba(200, 170, 110, 0.16);
                box-shadow: 0 0 0 1px rgba(200, 170, 110, 0.12) inset;
            }
            .select {
                border: 1px solid var(--stroke2);
                background: rgba(255, 255, 255, 0.06);
                color: var(--text);
                padding: 9px 12px;
                border-radius: 12px;
                font-weight: 700;
                font-size: 13px;
                letter-spacing: 0.2px;
            }
            .legend {
                color: var(--muted);
                font-size: 12px;
                display: flex;
                gap: 14px;
                flex-wrap: wrap;
                align-items: center;
            }
            .chip {
                display: inline-flex;
                align-items: center;
                gap: 7px;
            }
            /* .dot and .dot.alt removed: no longer used */
            canvas {
                width: 100%;
                height: 520px;
                display: block;
                border-radius: 12px;
                background: rgba(0, 0, 0, 0.22);
                border: 1px solid rgba(200, 170, 110, 0.22);
            }
            .foot {
                margin-top: 10px;
                color: var(--muted);
                font-size: 12px;
                line-height: 1.4;
            }
            code.inline {
                background: rgba(255, 255, 255, 0.06);
                padding: 2px 6px;
                border-radius: 6px;
                border: 1px solid rgba(255, 255, 255, 0.08);
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <header>
                <div>
                    <h1>EUW Rank Distribution</h1>
                    <div class="sub">From your screenshot (Summoner count + % per tier/division)</div>
                </div>
                <div class="sub">Single-file HTML • Canvas chart • No libraries</div>
            </header>

            <div class="panel">
                <div class="controls">
                    <div class="left">
                        <button id="modePercent" class="btn" aria-pressed="true">Show %</button>
                        <button id="modeCount" class="btn" aria-pressed="false">Show counts</button>

                        <select id="grouping" class="select" title="Grouping">
                            <option value="division" selected>Divisions (e.g. Gold 4)</option>
                            <option value="tier">Tiers only (e.g. Gold total)</option>
                        </select>
                    </div>

                    <div class="right legend">
                        <span class="sub">Colours = tier. Hover a bar for exact values.</span>
                    </div>
                </div>

                <canvas id="chart" width="1200" height="520"></canvas>

                <div class="foot">
                    Data is encoded below as a JS object. If you want to paste new numbers later, replace
                    <code class="inline">rankData</code>.
                </div>
            </div>
        </div>

        <script>
            // 1) JS object created from the screenshot data (EUW).
            // Fields: count = summoner count, pct = share of ladder (%), cum = cumulative (%).
            const rankData = [
                { key: "Challenger", count: 300, pct: 0.02, cum: 0.02 },
                { key: "Grandmaster", count: 700, pct: 0.04, cum: 0.06 },
                { key: "Master", count: 19509, pct: 1.09, cum: 1.15 },

                { key: "Diamond 1", count: 8993, pct: 0.5, cum: 1.65 },
                { key: "Diamond 2", count: 10288, pct: 0.57, cum: 2.22 },
                { key: "Diamond 3", count: 14427, pct: 0.81, cum: 3.03 },
                { key: "Diamond 4", count: 30442, pct: 1.7, cum: 4.73 },

                { key: "Emerald 1", count: 18260, pct: 1.02, cum: 5.75 },
                { key: "Emerald 2", count: 29351, pct: 1.64, cum: 7.39 },
                { key: "Emerald 3", count: 39587, pct: 2.21, cum: 9.6 },
                { key: "Emerald 4", count: 69320, pct: 3.87, cum: 13.5 },

                { key: "Platinum 1", count: 41264, pct: 2.31, cum: 15.8 },
                { key: "Platinum 2", count: 62249, pct: 3.48, cum: 19.3 },
                { key: "Platinum 3", count: 77476, pct: 4.33, cum: 23.6 },
                { key: "Platinum 4", count: 121843, pct: 6.81, cum: 30.0 },

                { key: "Gold 1", count: 72216, pct: 4.03, cum: 34.0 },
                { key: "Gold 2", count: 101090, pct: 5.65, cum: 40.0 },
                { key: "Gold 3", count: 114158, pct: 6.38, cum: 46.0 },
                { key: "Gold 4", count: 157003, pct: 8.77, cum: 55.0 },

                { key: "Silver 1", count: 88377, pct: 4.94, cum: 60.0 },
                { key: "Silver 2", count: 111124, pct: 6.21, cum: 66.0 },
                { key: "Silver 3", count: 114175, pct: 6.38, cum: 73.0 },
                { key: "Silver 4", count: 132650, pct: 7.41, cum: 80.0 },

                { key: "Bronze 1", count: 79719, pct: 4.45, cum: 85.0 },
                { key: "Bronze 2", count: 81009, pct: 4.53, cum: 89.0 },
                { key: "Bronze 3", count: 74999, pct: 4.19, cum: 93.0 },
                { key: "Bronze 4", count: 84930, pct: 4.74, cum: 98.0 },

                { key: "Iron 1", count: 22126, pct: 1.24, cum: 99.0 },
                { key: "Iron 2", count: 8287, pct: 0.46, cum: 100.0 },
                { key: "Iron 3", count: 2587, pct: 0.14, cum: 100.0 },
                { key: "Iron 4", count: 1533, pct: 0.09, cum: 100.0 },
            ];

            // --- Chart rendering (Canvas, no libs) ---
            const canvas = document.getElementById("chart");
            const ctx = canvas.getContext("2d");

            const modePercentBtn = document.getElementById("modePercent");
            const modeCountBtn = document.getElementById("modeCount");
            const groupingSel = document.getElementById("grouping");

            let mode = "pct"; // "pct" | "count"
            let grouping = "division"; // "division" | "tier"
            let hoverIndex = -1;
            let bars = [];

            const tierOrder = [
                "Challenger",
                "Grandmaster",
                "Master",
                "Diamond",
                "Emerald",
                "Platinum",
                "Gold",
                "Silver",
                "Bronze",
                "Iron",
            ];

            function getCssVar(name) {
                return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
            }

            const tierColor = {
                Challenger: getCssVar("--tier-challenger"),
                Grandmaster: getCssVar("--tier-grandmaster"),
                Master: getCssVar("--tier-master"),
                Diamond: getCssVar("--tier-diamond"),
                Emerald: getCssVar("--tier-emerald"),
                Platinum: getCssVar("--tier-platinum"),
                Gold: getCssVar("--tier-gold"),
                Silver: getCssVar("--tier-silver"),
                Bronze: getCssVar("--tier-bronze"),
                Iron: getCssVar("--tier-iron"),
            };

            function withAlpha(hex, a) {
                // hex like #RRGGBB
                const h = hex.replace("#", "");
                const r = parseInt(h.slice(0, 2), 16);
                const g = parseInt(h.slice(2, 4), 16);
                const b = parseInt(h.slice(4, 6), 16);
                return `rgba(${r},${g},${b},${a})`;
            }

            function getBarFillForKey(key, isHover) {
                const { tier } = parseTier(key);
                const base = tierColor[tier] || getCssVar("--tier-silver");
                return isHover ? getCssVar("--hover") : withAlpha(base, 0.92);
            }

            function getBarStrokeForKey(key) {
                const { tier } = parseTier(key);
                const base = tierColor[tier] || getCssVar("--tier-silver");
                return withAlpha(base, 0.35);
            }

            function parseTier(key) {
                // "Gold 4" -> { tier: "Gold", div: "4" } ; "Master" -> { tier: "Master", div: "" }
                const parts = key.split(" ");
                const t = parts[0];
                const d = parts.length > 1 ? parts[1] : "";
                return { tier: t, div: d };
            }

            function aggregateToTiers(data) {
                const map = new Map();
                for (const row of data) {
                    const { tier } = parseTier(row.key);
                    const k = tier; // tier-only key
                    const prev = map.get(k) || { key: k, count: 0, pct: 0, cum: null };
                    prev.count += row.count;
                    prev.pct += row.pct;
                    map.set(k, prev);
                }
                // Sort by tier order top->bottom
                return Array.from(map.values()).sort((a, b) => tierOrder.indexOf(a.key) - tierOrder.indexOf(b.key));
            }

            function getActiveData() {
                if (grouping === "tier") return aggregateToTiers(rankData).slice().reverse();
                return rankData.slice().reverse(); // reverse: Iron -> Challenger
            }

            function formatValue(row) {
                if (mode === "pct") return `${row.pct.toFixed(2)}%`;
                return row.count.toLocaleString("en-GB");
            }

            function draw() {
                const data = getActiveData();
                const W = canvas.width,
                    H = canvas.height;

                // Clear
                ctx.clearRect(0, 0, W, H);

                // Layout
                const padding = { l: 70, r: 24, t: 20, b: 92 };
                const chartW = W - padding.l - padding.r;
                const chartH = H - padding.t - padding.b;

                // Values
                const values = data.map((d) => (mode === "pct" ? d.pct : d.count));
                const maxV = Math.max(...values) || 1;

                // Gridlines
                ctx.strokeStyle = getCssVar("--grid");
                ctx.lineWidth = 1;

                const gridCount = 5;
                for (let i = 0; i <= gridCount; i++) {
                    const y = padding.t + (chartH * i) / gridCount;
                    ctx.beginPath();
                    ctx.moveTo(padding.l, y);
                    ctx.lineTo(padding.l + chartW, y);
                    ctx.stroke();

                    // Y labels (max at top = 0 line is top)
                    const v = maxV * (1 - i / gridCount);
                    ctx.fillStyle = "rgba(230,238,255,0.75)";
                    ctx.font = "12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif";
                    const label = mode === "pct" ? `${v.toFixed(1)}%` : `${Math.round(v).toLocaleString("en-GB")}`;
                    ctx.fillText(label, 10, y + 4);
                }

                // Bars
                const n = data.length;
                const gap = Math.max(6, Math.floor(chartW * 0.008));
                const barW = Math.max(10, Math.floor((chartW - gap * (n - 1)) / n));

                bars = [];
                for (let i = 0; i < n; i++) {
                    const d = data[i];
                    const v = mode === "pct" ? d.pct : d.count;
                    const h = (v / maxV) * chartH;
                    const x = padding.l + i * (barW + gap);
                    const y = padding.t + (chartH - h);

                    // Per-tier bar colours
                    ctx.fillStyle = getBarFillForKey(d.key, i === hoverIndex);
                    ctx.fillRect(x, y, barW, h);

                    // Subtle per-tier stroke for readability
                    ctx.strokeStyle = getBarStrokeForKey(d.key);
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x + 0.5, y + 0.5, barW - 1, h - 1);

                    // x label (rotated) — centred so edge labels remain visible
                    ctx.save();
                    ctx.translate(x + barW / 2, padding.t + chartH + 10);
                    ctx.rotate(-Math.PI / 6);
                    ctx.fillStyle = "rgba(230,238,255,0.85)";
                    ctx.font = "12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif";
                    ctx.textAlign = "center";
                    ctx.fillText(d.key, 0, 18);
                    ctx.restore();

                    bars.push({ x, y, w: barW, h, d });
                }

                // Title line
                ctx.fillStyle = "rgba(230,238,255,0.95)";
                ctx.font = "14px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif";
                const label = grouping === "tier" ? "Tiers" : "Divisions";
                const unit = mode === "pct" ? "Percent of ladder" : "Summoner count";
                ctx.fillText(`${label} — ${unit}`, padding.l, 16);

                // Tooltip
                if (hoverIndex >= 0 && bars[hoverIndex]) {
                    const { d, x, y } = bars[hoverIndex];
                    const lines = [
                        d.key,
                        `Value: ${formatValue(d)}`,
                        ...(grouping === "division" ? [`Cumulative: ${d.cum.toFixed(2)}%`] : []),
                    ];

                    // tooltip box
                    ctx.font = "12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif";
                    const pad = 10;
                    const textW = Math.max(...lines.map((t) => ctx.measureText(t).width));
                    const boxW = textW + pad * 2;
                    const boxH = lines.length * 16 + pad * 2;

                    let bx = x + 10;
                    let by = y - boxH - 10;
                    if (bx + boxW > W - 10) bx = W - boxW - 10;
                    if (by < 10) by = 10;

                    ctx.fillStyle = "rgba(0,0,0,0.75)";
                    ctx.strokeStyle = "rgba(200,170,110,0.22)";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.roundRect(bx, by, boxW, boxH, 10);
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = "rgba(230,238,255,0.95)";
                    let ty = by + pad + 12;
                    for (const t of lines) {
                        ctx.fillText(t, bx + pad, ty);
                        ty += 16;
                    }
                }
            }

            // Canvas roundRect polyfill (for older browsers)
            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                    const rr = Array.isArray(r) ? r : [r, r, r, r];
                    const [r1, r2, r3, r4] = rr.map((v) => Math.max(0, Math.min(v, Math.min(w, h) / 2)));
                    this.beginPath();
                    this.moveTo(x + r1, y);
                    this.arcTo(x + w, y, x + w, y + h, r2);
                    this.arcTo(x + w, y + h, x, y + h, r3);
                    this.arcTo(x, y + h, x, y, r4);
                    this.arcTo(x, y, x + w, y, r1);
                    this.closePath();
                    return this;
                };
            }

            // Hover detection
            canvas.addEventListener("mousemove", (e) => {
                const rect = canvas.getBoundingClientRect();
                const sx = (e.clientX - rect.left) * (canvas.width / rect.width);
                const sy = (e.clientY - rect.top) * (canvas.height / rect.height);

                let idx = -1;
                for (let i = 0; i < bars.length; i++) {
                    const b = bars[i];
                    if (sx >= b.x && sx <= b.x + b.w && sy >= b.y && sy <= b.y + b.h) {
                        idx = i;
                        break;
                    }
                }
                if (idx !== hoverIndex) {
                    hoverIndex = idx;
                    draw();
                }
            });

            canvas.addEventListener("mouseleave", () => {
                hoverIndex = -1;
                draw();
            });

            // Controls
            modePercentBtn.addEventListener("click", () => {
                mode = "pct";
                modePercentBtn.setAttribute("aria-pressed", "true");
                modeCountBtn.setAttribute("aria-pressed", "false");
                draw();
            });
            modeCountBtn.addEventListener("click", () => {
                mode = "count";
                modePercentBtn.setAttribute("aria-pressed", "false");
                modeCountBtn.setAttribute("aria-pressed", "true");
                draw();
            });
            groupingSel.addEventListener("change", () => {
                grouping = groupingSel.value;
                hoverIndex = -1;
                draw();
            });

            // Initial render
            draw();
        </script>
    </body>
</html>
